services:
  - type: web
    name: researcher-ai-mcp
    runtime: docker
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    dockerfilePath: ./infra/Dockerfile.server
    dockerContext: .
    healthCheckPath: /ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: RESEARCHER_RUNNER
        value: mock
      - key: AUTH_MODE
        value: session
      - key: RESEARCHER_SESSION_TTL_SECONDS
        value: "86400"
      - key: RESEARCHER_DATA_DIR
        value: /data
      - key: RESEARCHER_MAX_CONCURRENCY
        value: "1"
      - key: CORS_ORIGINS
        value: https://chatgpt.com,https://chat.openai.com,https://platform.openai.com
